<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What To Watch Next — Premium Movie Recommendations</title>
  <meta name="description" content="AI-assisted movie recommendation engine. Select your favorite films and discover what to watch next." />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #090615;
      --bg-gradient: linear-gradient(135deg, #090615 0%, #120a2e 50%, #06040d 100%);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.06);
      --card-hover-border: rgba(201, 168, 76, 0.3);
      --gold: #c9a84c;
      --gold-glow: rgba(201, 168, 76, 0.25);
      --text: #f0eee8;
      --text-muted: #8d899e;
      --text-dim: #5c5770;
      --indigo: #6322b5;
      --indigo-glow: rgba(99, 34, 181, 0.35);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      background-image: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: var(--gold);
      color: var(--bg);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 100px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* Header */
    .header {
      text-align: center;
      padding: 4rem 2rem 2rem;
      position: relative;
    }
    
    .header::before {
      content: '';
      position: absolute;
      top: -10%; left: 50%;
      transform: translateX(-50%);
      width: 400px; height: 180px;
      background: radial-gradient(circle, var(--indigo-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -1.5px;
      margin-bottom: 0.8rem;
      z-index: 1;
      position: relative;
    }

    .header h1 span {
      background: linear-gradient(135deg, var(--gold) 30%, #e9ca79 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px var(--gold-glow);
    }

    .header p {
      color: var(--text-muted);
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      max-width: 600px;
      margin: 0 auto;
      font-weight: 300;
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 10rem;
    }

    /* Controls Panel */
    .controls-panel {
      background: rgba(18, 10, 46, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 3rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 100;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1.5rem;
      align-items: center;
    }

    @media (max-width: 768px) {
      .controls-grid { grid-template-columns: 1fr; }
    }

    /* Tabs */
    .search-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.3rem;
      border-radius: 100px;
      width: fit-content;
      border: 1px solid var(--card-border);
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.5rem 1.2rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      border-radius: 100px;
      cursor: pointer;
      transition: var(--transition);
    }

    .tab-btn.active {
      background: var(--gold);
      color: var(--bg);
      box-shadow: 0 4px 12px var(--gold-glow);
    }

    /* Search & Filters */
    .search-box {
      position: relative;
      width: 100%;
      display: flex;
      gap: 0.8rem;
    }

    .search-input-wrapper {
      position: relative;
      flex-grow: 1;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      padding: 1.1rem 1.5rem 1.1rem 3.2rem;
      font-family: inherit;
      font-size: 1.05rem;
      color: var(--text);
      border-radius: 100px;
      transition: var(--transition);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 20px var(--gold-glow);
    }

    .search-icon {
      position: absolute;
      left: 1.3rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text);
      border-radius: 100px;
      padding: 0 1.5rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .search-btn:hover {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.1);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      background: linear-gradient(135deg, var(--gold) 0%, #a68433 100%);
      color: var(--bg);
      border: none;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 1.1rem 2.5rem;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 8px 25px var(--gold-glow);
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(201, 168, 76, 0.45);
      background: linear-gradient(135deg, #d8b75b 0%, var(--gold) 100%);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      box-shadow: none;
    }

    .btn-reset:hover {
      border-color: #d62728;
      color: #ff5252;
      background: rgba(214, 39, 40, 0.05);
      box-shadow: none;
    }

    /* Genre Tags */
    .genre-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      transition: var(--transition);
    }

    .genre-tag {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      border-radius: 100px;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
    }

    .genre-tag:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text);
    }

    .genre-tag.active {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 15px var(--gold-glow);
    }

    /* Selection Pool Stats */
    .selection-info {
      font-size: 0.9rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .selection-count {
      color: var(--gold);
      font-weight: 800;
    }

    /* Library Grid */
    .grid-header {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 2rem;
    }

    /* Movie Card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      background: linear-gradient(135deg, var(--gold), transparent) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      opacity: 0;
      transition: var(--transition);
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      border-color: transparent;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card.selected {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.04);
      box-shadow: 0 0 30px var(--gold-glow);
    }

    .card.selected::after {
      content: '✓';
      position: absolute;
      top: 12px; right: 12px;
      width: 32px; height: 32px;
      background: var(--gold);
      color: var(--bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: 800;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .poster-wrap {
      width: 100%;
      aspect-ratio: 2/3;
      overflow: hidden;
      position: relative;
      background: rgba(255, 255, 255, 0.02);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(9, 6, 21, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: var(--transition);
      z-index: 5;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .quick-rec-btn {
      background: var(--gold);
      color: var(--bg);
      border: none;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.6rem 1.2rem;
      border-radius: 100px;
      cursor: pointer;
      box-shadow: 0 4px 15px var(--gold-glow);
      transition: var(--transition);
      transform: translateY(10px);
    }

    .card:hover .quick-rec-btn {
      transform: translateY(0);
    }

    .quick-rec-btn:hover {
      background: #e9ca79;
      box-shadow: 0 6px 20px rgba(201, 168, 76, 0.6);
    }

    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
      opacity: 0.8;
    }

    .card:hover .poster-img {
      transform: scale(1.06);
      opacity: 1;
    }

    .card-info {
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      margin-top: auto;
      align-items: center;
    }

    .card-rating {
      color: var(--gold);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    /* Selected Floating Bar */
    .selection-bar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(150px);
      background: rgba(18, 10, 46, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 100px;
      padding: 0.8rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      z-index: 200;
      transition: var(--transition);
    }

    .selection-bar.show {
      transform: translateX(-50%) translateY(0);
    }

    .selection-thumbnails {
      display: flex;
      gap: 0.6rem;
    }

    .thumb-item {
      width: 45px;
      height: 65px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid var(--card-border);
      transition: var(--transition);
      cursor: pointer;
    }

    .thumb-item:hover {
      transform: translateY(-4px);
      border-color: #ff5252;
    }

    /* Results section */
    .results {
      margin-top: 5rem;
      padding-top: 5rem;
      border-top: 1px solid var(--card-border);
      display: none;
    }

    .results.show {
      display: block;
      animation: fadeIn 0.8s ease both;
    }

    .results h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .results h2 span {
      color: var(--gold);
      text-shadow: 0 0 20px var(--gold-glow);
    }

    .rec-card {
      display: flex;
      gap: 2rem;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      margin-bottom: 1.5rem;
      align-items: center;
      transition: var(--transition);
      animation: slideUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .rec-card:hover {
      border-color: var(--card-hover-border);
      background: rgba(255, 255, 255, 0.03);
    }

    .rec-poster {
      width: 120px;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: var(--radius-md);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      flex-shrink: 0;
      opacity: 0.85;
    }

    .rec-info {
      flex: 1;
    }

    .rec-rank {
      font-size: 0.75rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .rec-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .rec-genres {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    .rec-genre-pill {
      background: rgba(255, 255, 255, 0.03);
      padding: 0.2rem 0.7rem;
      border-radius: 50px;
      border: 1px solid var(--card-border);
    }

    .rec-overview {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .rec-match {
      text-align: center;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      flex-shrink: 0;
    }

    .rec-match-num {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--gold);
      display: block;
      text-shadow: 0 0 15px var(--gold-glow);
    }

    .rec-match-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rec-card:nth-child(1) { animation-delay: 0.1s; }
    .rec-card:nth-child(2) { animation-delay: 0.2s; }
    .rec-card:nth-child(3) { animation-delay: 0.3s; }
    .rec-card:nth-child(4) { animation-delay: 0.4s; }
    .rec-card:nth-child(5) { animation-delay: 0.5s; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 5rem 2rem 3rem;
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>What To Watch <span>Next</span></h1>
    <p>Select 2–5 movies you love from the TMDB 5,000+ database, and our smart hybrid engine will recommend what to watch next.</p>
  </div>

  <div class="container">
    
    <!-- Controls (Sticky glass container) -->
    <div class="controls-panel">
      <!-- Tab Switcher -->
      <div class="search-tabs">
        <button class="tab-btn active" id="tabLocal" onclick="switchTab('local')">Search Library (5,000+ Movies)</button>
        <button class="tab-btn" id="tabGlobal" onclick="switchTab('global')">Search Online (IMDb)</button>
      </div>

      <div class="controls-grid">
        <div>
          <div class="search-box">
            <div class="search-input-wrapper">
              <input type="text" class="search-input" id="searchInput" placeholder="Search 5,000+ movies..." />
              <span class="search-icon">🔍</span>
            </div>
            <button class="search-btn" id="searchBtn" style="display:none" onclick="triggerGlobalSearch()">Search IMDb</button>
          </div>
          
          <div class="genre-filters" id="genreFilters">
            <!-- Dynamic tags -->
          </div>
        </div>
        
        <div class="btn-group">
          <button class="btn btn-reset" id="resetBtn" style="display:none">Reset</button>
          <button class="btn" id="recBtn" disabled>Get Recommendations</button>
        </div>
      </div>
    </div>

    <!-- Main Grid -->
    <div>
      <div class="grid-header">
        <span id="gridTitle">Explore Library</span>
        <div class="selection-info">
          <span>Selected:</span>
          <span class="selection-count" id="count">0</span> / 5
        </div>
      </div>
      <div class="movie-grid" id="grid">
        <!-- Rendered movie cards -->
      </div>
    </div>

    <!-- Results Section -->
    <div class="results" id="results">
      <!-- Recommendations dynamically output here -->
    </div>

  </div>

  <!-- Selection Floating Bar -->
  <div class="selection-bar" id="selectionBar">
    <span style="font-size: 0.85rem; font-weight: 500;">Selected Movies:</span>
    <div class="selection-thumbnails" id="selectionThumbnails"></div>
    <button class="btn" style="padding: 0.7rem 1.5rem; font-size: 0.8rem;" id="floatingRecBtn">Find Matches</button>
  </div>

  <div class="footer">
    Built with passion by Kushagra Kartikey Suman • Hybrid Cosine Similarity Engine
  </div>

  <script>
    let MOVIES = [];
    const selected = new Set();
    const customMovies = new Map(); // Stores external IMDb movies added by search
    let activeGenre = null;
    let searchQuery = "";
    let searchMode = "local"; // "local" or "global"
    let globalSearchResults = [];

    // LocalStorage Poster Cache (Prevents hammering the IMDb API and speeds up loads)
    const posterCache = JSON.parse(localStorage.getItem('movie_posters_cache') || '{}');

    const ALL_GENRES = ["Action","Adventure","Animation","Comedy","Crime","Drama","Horror","Music","Mystery","Romance","Sci-Fi","Thriller","Western"];

    // Input Debouncing to prevent heavy updates while typing
    function debounce(func, delay) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), delay);
      };
    }

    // Initialize & Fetch 5000 movies JSON database
    async function init() {
      try {
        initPosterObserver();
        const res = await fetch('./movies_5000.json');
        MOVIES = await res.json();
        renderGenres();
        render();
      } catch (err) {
        console.error("Error loading movie database:", err);
      }
    }

    function getSvgPlaceholder(title) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450">
        <rect width="300" height="450" fill="#1a1a2e"/>
        <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#c9a84c" font-weight="bold">${title}</text>
        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">NO POSTER AVAILABLE</text>
      </svg>`;
      return `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svg)))}`;
    }

    function getLoadingPlaceholder() {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450">
        <rect width="300" height="450" fill="#120c24"/>
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5c5770" font-weight="bold">LOADING POSTER</text>
      </svg>`;
      return `data:image/svg+xml;base64,${btoa(svg)}`;
    }

    const requestQueue = [];
    let activeRequests = 0;
    const MAX_CONCURRENT_REQUESTS = 3;
    const REQUEST_DELAY = 100;

    function queuePosterRequest(title, resolve, reject) {
      requestQueue.push({ title, resolve, reject });
      processQueue();
    }

    function processQueue() {
      if (activeRequests >= MAX_CONCURRENT_REQUESTS || requestQueue.length === 0) return;

      const { title, resolve, reject } = requestQueue.shift();
      activeRequests++;

      fetchPoster(title)
        .then(url => {
          resolve(url);
        })
        .catch(err => {
          resolve(getSvgPlaceholder(title));
        })
        .finally(() => {
          activeRequests--;
          setTimeout(processQueue, REQUEST_DELAY);
        });
    }

    async function fetchPoster(title) {
      try {
        const res = await fetch(`https://imdb.iamidiotareyoutoo.com/search?q=${encodeURIComponent(title)}`);
        const data = await res.json();
        if (data.ok && data.description && data.description[0]) {
          const poster = data.description[0]['#IMG_POSTER'];
          if (poster) {
            posterCache[title] = poster;
            localStorage.setItem('movie_posters_cache', JSON.stringify(posterCache));
            return poster;
          }
        }
      } catch (err) {
        console.error("Error fetching poster for:", title, err);
      }
      return getSvgPlaceholder(title);
    }

    // Keyless IMDb suggest API / fallback placeholder
    function getPosterUrl(title) {
      if (posterCache[title]) return Promise.resolve(posterCache[title]);
      return new Promise((resolve, reject) => {
        queuePosterRequest(title, resolve, reject);
      });
    }

    // Intersection Observer for lazy loading posters that aren't pre-populated
    let posterObserver;
    function initPosterObserver() {
      if ('IntersectionObserver' in window) {
        posterObserver = new IntersectionObserver((entries, observer) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              const title = img.getAttribute('data-src');
              if (title) {
                loadCardPoster(img, title);
              }
              observer.unobserve(img);
            }
          });
        }, {
          rootMargin: "200px 0px" // Load slightly before they scroll into view
        });
      }
    }

    function lazyLoadImg(img, title) {
      if (posterObserver) {
        posterObserver.observe(img);
      } else {
        loadCardPoster(img, title);
      }
    }

    // Async poster loader for cards
    async function loadCardPoster(imgElement, title) {
      const url = await getPosterUrl(title);
      imgElement.src = url;
    }

    // Switch Search Modes
    function switchTab(mode) {
      searchMode = mode;
      document.getElementById('tabLocal').classList.toggle('active', mode === 'local');
      document.getElementById('tabGlobal').classList.toggle('active', mode === 'global');
      
      const input = document.getElementById('searchInput');
      const searchBtn = document.getElementById('searchBtn');
      const genreFilters = document.getElementById('genreFilters');
      const gridTitle = document.getElementById('gridTitle');

      if (mode === 'local') {
        input.placeholder = "Search 5,000+ movies...";
        searchBtn.style.display = "none";
        genreFilters.style.display = "flex";
        gridTitle.textContent = "Explore Library";
        searchQuery = input.value.toLowerCase().trim();
        render();
      } else {
        input.placeholder = "Search any movie globally (press Enter or click search)...";
        searchBtn.style.display = "block";
        genreFilters.style.display = "none";
        gridTitle.textContent = "IMDb Online Search Results";
        renderGlobalResults();
      }
    }

    // Render genre filters
    function renderGenres() {
      const container = document.getElementById('genreFilters');
      container.innerHTML = `<button class="genre-tag ${!activeGenre ? 'active' : ''}" onclick="filterGenre(null)">All</button>` + 
        ALL_GENRES.map(g => `<button class="genre-tag ${activeGenre === g ? 'active' : ''}" onclick="filterGenre('${g}')">${g}</button>`).join('');
    }

    function filterGenre(genre) {
      activeGenre = genre;
      renderGenres();
      render();
    }

    // Search bar input trigger
    document.getElementById('searchInput').onkeydown = (e) => {
      if (e.key === 'Enter') {
        if (searchMode === 'global') {
          triggerGlobalSearch();
        }
      }
    };

    // Debounced search typing to prevent lag
    document.getElementById('searchInput').oninput = debounce((e) => {
      searchQuery = e.target.value.toLowerCase().trim();
      if (searchMode === 'local') {
        render();
      }
    }, 250);

    // Trigger IMDb API search
    async function triggerGlobalSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      const grid = document.getElementById('grid');
      grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem 0;">Searching IMDb database...</div>`;

      try {
        const res = await fetch(`https://imdb.iamidiotareyoutoo.com/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        if (data.ok && data.description) {
          globalSearchResults = data.description.map(item => ({
            id: `custom_${item['#IMDB_ID']}`,
            title: item['#TITLE'],
            year: parseInt(item['#YEAR']) || 0,
            poster: item['#IMG_POSTER'],
            genre: ["Drama"], // Fallback
            rating: 7.5, // Fallback
            overview: `IMDb Title. Featured Actors: ${item['#ACTORS'] || 'N/A'}.`
          }));
        } else {
          globalSearchResults = [];
        }
        renderGlobalResults();
      } catch (err) {
        console.error("Global search error:", err);
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #ff5252; padding: 4rem 0;">Error fetching search results from IMDb.</div>`;
      }
    }

    // Render Global Search Results
    function renderGlobalResults() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (globalSearchResults.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem 0;">Type a movie title above and click "Search IMDb".</div>`;
        return;
      }

      globalSearchResults.forEach(m => {
        const card = document.createElement('div');
        const isSel = selected.has(m.id);
        card.className = `card ${isSel ? 'selected' : ''}`;
        
        const posterUrl = m.poster || `https://placehold.co/300x450/1a1a2e/c9a84c?text=${encodeURIComponent(m.title)}`;

        card.innerHTML = `
          <div class="poster-wrap">
            <img class="poster-img" src="${posterUrl}" alt="${m.title}" loading="lazy" />
            <div class="card-overlay">
              <button class="quick-rec-btn" id="btn_rec_${m.id}">Find Similar</button>
            </div>
          </div>
          <div class="card-info">
            <div class="card-title">${m.title}</div>
            <div class="card-meta">
              <span>${m.year || 'N/A'}</span>
              <span class="card-rating">IMDb</span>
            </div>
          </div>
        `;
        
        card.onclick = () => {
          if (selected.has(m.id)) {
            selected.delete(m.id);
            customMovies.delete(m.id);
          } else {
            if (selected.size >= 5) {
              alert("You can select up to 5 movies.");
              return;
            }
            selected.add(m.id);
            customMovies.set(m.id, m);
          }
          updateUI();
        };

        const quickRecBtn = card.querySelector(`#btn_rec_${m.id}`);
        quickRecBtn.onclick = (e) => {
          e.stopPropagation();
          selected.clear();
          customMovies.clear();
          selected.add(m.id);
          customMovies.set(m.id, m);
          updateUI();
          runRec();
        };

        grid.appendChild(card);
      });
    }

    // Genre Vector Mapping
    function genreVec(genres) {
      return ALL_GENRES.map(g => genres.includes(g) ? 1 : 0);
    }
    
    function dot(a, b) {
      return a.reduce((s, v, i) => s + v * b[i], 0);
    }
    
    function mag(a) {
      return Math.sqrt(a.reduce((s, v) => s + v * v, 0));
    }
    
    function cosSim(a, b) {
      const d = mag(a) * mag(b);
      return d === 0 ? 0 : dot(a, b) / d;
    }

    // Stop words list for keyword extraction
    const STOP_WORDS = new Set(["the", "a", "an", "and", "or", "but", "if", "then", "of", "to", "in", "on", "at", "for", "with", "by", "about", "against", "between", "into", "through", "during", "before", "after", "above", "below", "from", "up", "down", "in", "out", "on", "off", "over", "under", "again", "further", "once", "here", "there", "when", "where", "why", "how", "all", "any", "both", "each", "few", "more", "most", "other", "some", "such", "no", "nor", "not", "only", "own", "same", "so", "than", "too", "very", "can", "will", "just", "should", "now", "is", "was", "were", "be", "been", "being", "have", "has", "had", "having", "do", "does", "did", "doing", "who", "whom", "this", "that", "these", "those", "am", "are", "his", "her", "him", "their", "them", "its", "he", "she", "it", "they", "we", "you", "i", "about", "also", "into", "their", "would", "could", "should", "more", "like", "one", "two", "three", "first", "second", "their", "our", "your", "my", "me", "us", "out", "about", "into", "over", "after", "before", "through", "while", "during", "without", "with", "under", "between", "against", "among", "along"]);

    // Text tokenization & stop-words filtering
    function getWords(text) {
      if (!text) return [];
      return text.toLowerCase()
        .replace(/[^\w\s]/g, '')
        .split(/\s+/)
        .filter(word => word.length > 2 && !STOP_WORDS.has(word));
    }

    // Bag of Words Vector builder
    function buildWordVec(words, vocab) {
      const vec = {};
      words.forEach(w => {
        if (vocab.has(w)) vec[w] = (vec[w] || 0) + 1;
      });
      return vec;
    }

    // Cosine similarity for word vectors
    function cosSimBoW(vecA, vecB) {
      let dotProduct = 0;
      let magA = 0;
      let magB = 0;
      for (const w in vecA) {
        if (vecB[w]) dotProduct += vecA[w] * vecB[w];
        magA += vecA[w] * vecA[w];
      }
      for (const w in vecB) {
        magB += vecB[w] * vecB[w];
      }
      if (magA === 0 || magB === 0) return 0;
      return dotProduct / (Math.sqrt(magA) * Math.sqrt(magB));
    }

    // recommendation algorithm
    function recommend() {
      // Merge local library movies and selected custom ones
      const picks = MOVIES.concat(Array.from(customMovies.values())).filter(m => selected.has(m.id));
      if (picks.length < 1) return [];
      
      // 1. Average Genre Vector
      const avgVec = ALL_GENRES.map((_, i) => picks.reduce((s, m) => s + genreVec(m.genre)[i], 0) / picks.length);
      
      // 2. Aggregate Description/Overview Keywords
      const allSelectedWords = picks.flatMap(m => getWords(m.overview));
      const avgRating = picks.reduce((s, m) => s + m.rating, 0) / picks.length;
      
      // We only recommend movies from our high-quality local library database
      const candidates = MOVIES.filter(m => !selected.has(m.id));
      const scored = candidates.map(m => {
        // Genre similarity (Macro-matching)
        const gSim = cosSim(avgVec, genreVec(m.genre));
        
        // Overview text keyword similarity (Micro-matching)
        const mWords = getWords(m.overview);
        const vocab = new Set([...allSelectedWords, ...mWords]);
        const vecA = buildWordVec(allSelectedWords, vocab);
        const vecB = buildWordVec(mWords, vocab);
        const tSim = cosSimBoW(vecA, vecB);
        
        // Rating match (subtle bonus)
        const rSim = 1 - Math.abs(m.rating - avgRating) / 10;
        
        // Hybrid Score: 50% Genre Vector + 40% Keyword Overview + 10% Rating similarity
        const score = gSim * 0.5 + tSim * 0.4 + rSim * 0.1;
        return { ...m, score };
      });
      
      scored.sort((a, b) => b.score - a.score);
      return scored.slice(0, 5);
    }

    // Render Library Movies
    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      const filtered = MOVIES.filter(m => {
        const matchesSearch = !searchQuery || m.title.toLowerCase().includes(searchQuery);
        const matchesGenre = !activeGenre || m.genre.includes(activeGenre);
        return matchesSearch && matchesGenre;
      });

      // Show top 60 cards initially when not searching to prevent DOM loading lag
      const limit = searchQuery ? filtered.length : 60;
      const displayList = filtered.slice(0, limit);

      if (displayList.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem 0;">No movies found matching your criteria.</div>`;
        return;
      }

      displayList.forEach(m => {
        const card = document.createElement('div');
        const isSel = selected.has(m.id);
        card.className = `card ${isSel ? 'selected' : ''}`;
        
        // Base placeholder SVG loaded instantly if no poster path is available
        const basePlaceholder = getLoadingPlaceholder();

        const posterSrc = m.poster || basePlaceholder;

        card.innerHTML = `
          <div class="poster-wrap">
            <img class="poster-img" src="${posterSrc}" alt="${m.title}" id="img_${m.id}" loading="lazy" />
            <div class="card-overlay">
              <button class="quick-rec-btn" id="btn_rec_${m.id}">Find Similar</button>
            </div>
          </div>
          <div class="card-info">
            <div class="card-title">${m.title}</div>
            <div class="card-meta">
              <span>${m.year}</span>
              <span class="card-rating">★ ${m.rating}</span>
            </div>
          </div>
        `;
        
        card.onclick = () => {
          if (selected.has(m.id)) {
            selected.delete(m.id);
          } else {
            if (selected.size >= 5) {
              alert("You can select up to 5 movies.");
              return;
            }
            selected.add(m.id);
          }
          updateUI();
        };

        const quickRecBtn = card.querySelector(`#btn_rec_${m.id}`);
        quickRecBtn.onclick = (e) => {
          e.stopPropagation();
          selected.clear();
          customMovies.clear();
          selected.add(m.id);
          updateUI();
          runRec();
        };

        grid.appendChild(card);

        // If poster is not pre-populated, load it lazily
        if (!m.poster) {
          const img = card.querySelector(`#img_${m.id}`);
          img.setAttribute('data-src', m.title);
          lazyLoadImg(img, m.title);
        }
      });
    }

    // Update UI components
    function updateUI() {
      if (searchMode === 'local') {
        render();
      } else {
        renderGlobalResults();
      }
      
      const countEl = document.getElementById('count');
      countEl.textContent = selected.size;

      // Handle buttons disabled states
      const canRec = selected.size >= 1;
      document.getElementById('recBtn').disabled = !canRec;
      document.getElementById('floatingRecBtn').disabled = !canRec;
      document.getElementById('resetBtn').style.display = selected.size > 0 ? 'inline-block' : 'none';

      // Selection bar management
      const bar = document.getElementById('selectionBar');
      const thumbs = document.getElementById('selectionThumbnails');
      thumbs.innerHTML = '';

      if (selected.size > 0) {
        bar.classList.add('show');
        
        // Merge lists to find selected poster images
        const allSelected = MOVIES.concat(Array.from(customMovies.values())).filter(m => selected.has(m.id));
        allSelected.forEach(m => {
          const img = document.createElement('img');
          img.className = 'thumb-item';
          const basePlaceholder = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="50" height="75" viewBox="0 0 50 75"><rect width="50" height="75" fill="%231a1a2e"/></svg>`;
          img.src = m.poster || basePlaceholder;
          img.title = `Remove ${m.title}`;
          img.onclick = () => {
            selected.delete(m.id);
            customMovies.delete(m.id);
            updateUI();
          };
          thumbs.appendChild(img);

          // Asynchronously load thumbnail image if not pre-populated
          if (!m.poster) {
            loadCardPoster(img, m.title);
          }
        });
      } else {
        bar.classList.remove('show');
      }

      if (selected.size < 1) {
        document.getElementById('results').classList.remove('show');
      }
    }

    // Run Recommendation
    const runRec = () => {
      const recs = recommend();
      const div = document.getElementById('results');
      
      div.innerHTML = `
        <h2>Recommendations for <span>You</span></h2>
        ${recs.map((m, i) => {
          const basePlaceholder = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="180" viewBox="0 0 120 180"><rect width="120" height="180" fill="%231a1a2e"/></svg>`;
          const posterSrc = m.poster || basePlaceholder;
          return `
            <div class="rec-card">
              <img class="rec-poster" id="rec_img_${m.id}" src="${posterSrc}" alt="${m.title}" />
              <div class="rec-info">
                <div class="rec-rank">#${i + 1} Best Match</div>
                <div class="rec-title">${m.title} (${m.year})</div>
                <div class="rec-genres">
                  ${m.genre.map(g => `<span class="rec-genre-pill">${g}</span>`).join('')}
                </div>
                <div class="rec-overview">${m.overview}</div>
              </div>
              <div class="rec-match">
                <span class="rec-match-num">${Math.round(m.score * 100)}%</span>
                <span class="rec-match-label">Match Score</span>
              </div>
            </div>
          `;
        }).join('')}
      `;
      div.classList.add('show');
      div.scrollIntoView({ behavior: 'smooth' });

      // Asynchronously load recommendation posters if not pre-populated
      recs.forEach(m => {
        if (!m.poster) {
          const img = document.getElementById(`rec_img_${m.id}`);
          if (img) loadCardPoster(img, m.title);
        }
      });
    };

    document.getElementById('recBtn').onclick = runRec;
    document.getElementById('floatingRecBtn').onclick = runRec;

    document.getElementById('resetBtn').onclick = () => {
      selected.clear();
      customMovies.clear();
      document.getElementById('results').classList.remove('show');
      updateUI();
    };

    // Start App
    init();
  </script>
</body>
