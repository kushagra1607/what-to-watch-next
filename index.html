<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What To Watch Next — Movie Recommendations</title>
  <meta name="description" content="Content-based movie recommendation engine. Pick movies you love, get personalized suggestions." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #0a0a14; --card: #12121e; --border: rgba(255,255,255,0.07);
      --gold: #c9a84c; --gold-dim: rgba(201,168,76,0.15); --text: #f0eee8;
      --muted: #8a8694; --dim: #55506a; --radius: 12px;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    ::selection { background:var(--gold); color:var(--bg); }
    a { color:var(--gold); }

    /* Header */
    .header { text-align:center; padding:3rem 2rem 1rem; }
    .header h1 { font-size:clamp(1.8rem,4vw,3rem); font-weight:700; letter-spacing:-1px; margin-bottom:0.5rem; }
    .header h1 span { color:var(--gold); }
    .header p { color:var(--muted); font-size:0.95rem; max-width:500px; margin:0 auto; }

    /* Controls */
    .controls { text-align:center; padding:1rem 2rem 0.5rem; position:sticky; top:0; z-index:50;
      background:rgba(10,10,20,0.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
    .controls .info { font-size:0.8rem; color:var(--dim); margin-bottom:0.8rem; }
    .controls .count { color:var(--gold); font-weight:600; }
    .btn { background:var(--gold); color:var(--bg); border:none; font-family:inherit; font-size:0.85rem;
      font-weight:600; padding:0.7rem 2rem; border-radius:100px; cursor:pointer; letter-spacing:0.5px;
      transition:all 0.3s ease; text-transform:uppercase; }
    .btn:hover { background:#d4b55a; box-shadow:0 4px 20px rgba(201,168,76,0.35); transform:translateY(-1px); }
    .btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-reset { background:transparent; border:1px solid var(--border); color:var(--muted); margin-left:0.5rem; }
    .btn-reset:hover { border-color:var(--gold); color:var(--gold); background:transparent; box-shadow:none; }

    /* Grid */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem;
      padding:2rem; max-width:1200px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      overflow:hidden; cursor:pointer; transition:all 0.3s ease; position:relative; }
    .card:hover { transform:translateY(-4px); border-color:rgba(255,255,255,0.12); }
    .card.selected { border-color:var(--gold); box-shadow:0 0 20px rgba(201,168,76,0.2); }
    .card.selected::after { content:'✓'; position:absolute; top:8px; right:8px; width:28px; height:28px;
      background:var(--gold); color:var(--bg); border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:0.8rem; font-weight:700; }
    .card-poster { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:var(--card); }
    .card-info { padding:0.8rem; }
    .card-title { font-size:0.82rem; font-weight:600; margin-bottom:0.2rem; line-height:1.3;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-meta { font-size:0.7rem; color:var(--dim); display:flex; justify-content:space-between; }
    .card-rating { color:var(--gold); font-weight:600; }

    /* Results */
    .results { max-width:800px; margin:0 auto; padding:2rem; display:none; }
    .results.show { display:block; }
    .results h2 { font-size:1.5rem; font-weight:700; margin-bottom:1.5rem; text-align:center; }
    .results h2 span { color:var(--gold); }
    .rec-card { display:flex; gap:1.2rem; padding:1.2rem; background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); margin-bottom:1rem; animation:fadeUp 0.5s ease both; align-items:center; }
    .rec-card:nth-child(2) { animation-delay:0.1s; }
    .rec-card:nth-child(3) { animation-delay:0.2s; }
    .rec-card:nth-child(4) { animation-delay:0.3s; }
    .rec-card:nth-child(5) { animation-delay:0.4s; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .rec-poster { width:80px; height:120px; object-fit:cover; border-radius:8px; flex-shrink:0; }
    .rec-info { flex:1; }
    .rec-rank { font-size:0.65rem; color:var(--dim); text-transform:uppercase; letter-spacing:2px; margin-bottom:0.3rem; }
    .rec-title { font-size:1.1rem; font-weight:600; margin-bottom:0.3rem; }
    .rec-genres { font-size:0.75rem; color:var(--muted); margin-bottom:0.5rem; }
    .rec-overview { font-size:0.8rem; color:var(--dim); line-height:1.5; }
    .rec-match { text-align:right; flex-shrink:0; }
    .rec-match-num { font-size:1.6rem; font-weight:700; color:var(--gold); display:block; }
    .rec-match-label { font-size:0.6rem; color:var(--dim); text-transform:uppercase; letter-spacing:1px; }

    .footer { text-align:center; padding:3rem 2rem; font-size:0.7rem; color:var(--dim); letter-spacing:1px;
      text-transform:uppercase; }

    @media (max-width:600px) {
      .grid { grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:0.8rem; padding:1rem; }
      .rec-card { flex-direction:column; text-align:center; }
      .rec-match { text-align:center; }
    }
  </style>
</head>
<body>

  {id:50,title:"The Batman",year:2022,genre:["Action","Crime","Drama"],rating:7.8,overview:"Batman ventures into Gotham's underworld when a sadistic killer leaves behind cryptic clues."}
];

const ALL_GENRES=["Action","Adventure","Animation","Comedy","Crime","Drama","Horror","Music","Mystery","Romance","Sci-Fi","Thriller","Western"];
let selected=new Set();

function genreVec(genres){return ALL_GENRES.map(g=>genres.includes(g)?1:0)}
function dot(a,b){return a.reduce((s,v,i)=>s+v*b[i],0)}
function mag(a){return Math.sqrt(a.reduce((s,v)=>s+v*v,0))}
function cosSim(a,b){const d=mag(a)*mag(b);return d===0?0:dot(a,b)/d}

function recommend(){
  const picks=MOVIES.filter(m=>selected.has(m.id));
  if(picks.length<2)return[];
  // Average genre vector + avg rating of selected
  const avgVec=ALL_GENRES.map((_,i)=>picks.reduce((s,m)=>s+genreVec(m.genre)[i],0)/picks.length);
  const avgRating=picks.reduce((s,m)=>s+m.rating,0)/picks.length;
  const candidates=MOVIES.filter(m=>!selected.has(m.id));
  const scored=candidates.map(m=>{
    const gSim=cosSim(avgVec,genreVec(m.genre));
    const rSim=1-Math.abs(m.rating-avgRating)/10;
    const score=gSim*0.75+rSim*0.25;
    return {...m,score};
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,5);
}

function posterURL(title){return `https://placehold.co/300x450/1a1a2e/c9a84c?text=${encodeURIComponent(title.replace(/ /g,'+'))}`}

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  MOVIES.forEach(m=>{
    const card=document.createElement('div');
    card.className='card'+(selected.has(m.id)?' selected':'');
    card.innerHTML=`<img class="card-poster" src="${posterURL(m.title)}" alt="${m.title}" loading="lazy"/>
      <div class="card-info"><div class="card-title">${m.title}</div>
      <div class="card-meta"><span>${m.year}</span><span class="card-rating">★ ${m.rating}</span></div></div>`;
    card.onclick=()=>{
      if(selected.has(m.id))selected.delete(m.id);
      else if(selected.size<5)selected.add(m.id);
      updateUI();
    };
    grid.appendChild(card);
  });
}

function updateUI(){
  render();
  document.getElementById('count').textContent=selected.size;
  document.getElementById('recBtn').disabled=selected.size<2;
  document.getElementById('resetBtn').style.display=selected.size>0?'inline-block':'none';
  if(selected.size<2)document.getElementById('results').classList.remove('show');
}

document.getElementById('recBtn').onclick=()=>{
  const recs=recommend();
  const div=document.getElementById('results');
  div.innerHTML=`<h2>Your <span>Recommendations</span></h2>`+recs.map((m,i)=>
    `<div class="rec-card"><img class="rec-poster" src="${posterURL(m.title)}" alt="${m.title}"/>
    <div class="rec-info"><div class="rec-rank">#${i+1} Recommendation</div>
    <div class="rec-title">${m.title} (${m.year})</div>
    <div class="rec-genres">${m.genre.join(' · ')}</div>
    <div class="rec-overview">${m.overview}</div></div>
    <div class="rec-match"><span class="rec-match-num">${Math.round(m.score*100)}%</span>
    <span class="rec-match-label">Match</span></div></div>`
  ).join('');
  div.classList.add('show');
  div.scrollIntoView({behavior:'smooth'});
};

document.getElementById('resetBtn').onclick=()=>{
  selected.clear();
  document.getElementById('results').classList.remove('show');
  updateUI();
};

render();
</script>
</body>
